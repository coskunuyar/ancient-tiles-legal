<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ancient Tiles</title>
    <style>
        /* Basic reset and dark theme styling */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #1a1a2e; 
            color: #ffffff; 
            text-align: center; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            padding: 20px;
            box-sizing: border-box;
        }
        h1 { 
            font-size: 3rem; 
            margin-bottom: 10px; 
            color: #e94560;
        }
        p { 
            font-size: 1.2rem; 
            color: #a2a2bd; 
            margin-bottom: 40px; 
            max-width: 500px; 
            line-height: 1.6; 
        }
        .download-btn { 
            background-color: #0f3460; 
            color: #ffffff; 
            padding: 18px 36px; 
            text-decoration: none; 
            font-size: 1.3rem; 
            font-weight: bold; 
            border-radius: 30px; 
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .download-btn:hover { 
            background-color: #e94560; 
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <h1>Ancient Tiles</h1>
    <p>Dive into the mystery. Test your skills and download the ultimate puzzle experience today.</p>
    
    <a href="https://play.google.com/store/apps/details?id=com.coskunuyar.ancienttiles" class="download-btn">Get it on Google Play</a>

</body>
</html>
