<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ancient Tiles</title>
    <style>
        /* Light theme styling */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #ffffff; /* Changed to white background */
            color: #333333; /* Darker text for readability */
            text-align: center; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            padding: 20px;
            box-sizing: border-box;
        }
        h1 { 
            font-size: 3rem; 
            margin-bottom: 10px; 
            color: #2c3e50; /* Clean dark blue/grey for the title */
        }
        p { 
            font-size: 1.2rem; 
            color: #666666; /* Gray text for the description */
            margin-bottom: 40px; 
            max-width: 500px; 
            line-height: 1.6; 
        }
        .play-badge {
            width: 240px; /* Adjust this value to make the badge bigger or smaller */
            transition: transform 0.3s ease;
        }
        .play-badge:hover {
            transform: translateY(-3px); /* Slight hover effect */
        }
    </style>
</head>
<body>

    <h1>Ancient Tiles</h1>
    <p>Dive into the mystery. Test your skills and download the ultimate puzzle experience today.</p>
    
    <a href="https://play.google.com/store/apps/details?id=com.coskunuyar.ancienttiles">
        <img class="play-badge" alt="Get it on Google Play" src="https://play.google.com/intl/en_us/badges/static/images/badges/en_badge_web_generic.png" />
    </a>

</body>
</html>
